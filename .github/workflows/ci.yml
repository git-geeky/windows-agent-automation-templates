name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - shell: pwsh
        run: python -m unittest discover -s tests
      - shell: powershell
        run: .\tests\Test-PowerShellParse.ps1
      - shell: powershell
        run: .\scripts\New-AgentTaskXml.ps1 -Manifest .\templates\task.restore.example.json -Template .\task-xml\AgentTask.template.xml -OutFile .\out\AgentTask.xml
